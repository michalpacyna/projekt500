<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJEKT500</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: transparent;
    padding: 16px 4px;
    color: #1a1a1a;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e8e5;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 10px;
  }

  .label {
    font-size: 12px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .value {
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .sub {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 12px;
  }

  .track {
    height: 7px;
    background: #f0f0ee;
    border-radius: 4px;
    overflow: hidden;
  }

  .fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .meta {
    font-size: 11px;
    color: #bbb;
    margin-top: 5px;
    text-align: right;
  }

  .negative { color: #d85a30; }
</style>
</head>
<body>

<div id="root"></div>

<script>
  const START = new Date('2026-05-22T00:00:00');
  const HALF  = new Date('2027-04-18T00:00:00');
  const FULL  = new Date('2027-10-03T00:00:00');

  function days(a, b) {
    return Math.round((b - a) / 86400000);
  }

  function clamp(v, lo, hi) {
    return Math.max(lo, Math.min(hi, v));
  }

  function render() {
    const now = new Date();
    now.setHours(0, 0, 0, 0);

    const dayNum  = days(START, now);
    const toHalf  = days(now, HALF);
    const toFull  = days(now, FULL);
    const toStart = days(now, START);

    const daysToHalf = days(START, HALF);

    const pctMain = clamp(dayNum / 500 * 100, 0, 100);
    const pctHalf = clamp(dayNum / daysToHalf * 100, 0, 100);
    const pctFull = clamp(dayNum / 500 * 100, 0, 100);

    let dayLabel, dayClass = '';
    if (dayNum < 0) {
      dayLabel = `Dzień ${dayNum} / 500`;
      dayClass = 'negative';
    } else if (dayNum === 0) {
      dayLabel = `Dzień 0 / 500 — dziś start!`;
    } else {
      dayLabel = `Dzień ${dayNum} / 500`;
    }

    document.getElementById('root').innerHTML = `
      <div class="card">
        <div class="label">Obecnie jest</div>
        <div class="value ${dayClass}">${dayLabel}</div>
        <div class="sub">Start: 22 maja 2025 &nbsp;·&nbsp; Meta: 3 października 2027</div>
        <div class="track"><div class="fill" style="width:${pctMain}%;background:#7F77DD"></div></div>
        <div class="meta">${Math.round(pctMain)}% ukończone</div>
      </div>

      <div class="card">
        <div class="label">Odliczanie do Półmaratonu</div>
        <div class="value">Do półmaratonu pozostało ${toHalf} dni</div>
        <div class="sub">18 kwietnia 2027</div>
        <div class="track"><div class="fill" style="width:${pctHalf}%;background:#D85A30"></div></div>
        <div class="meta">Postęp przygotowań: ${Math.round(pctHalf)}%</div>
      </div>

      <div class="card">
        <div class="label">Odliczanie do Maratonu</div>
        <div class="value">Do maratonu pozostało ${toFull} dni</div>
        <div class="sub">3 października 2027</div>
        <div class="track"><div class="fill" style="width:${pctFull}%;background:#1D9E75"></div></div>
        <div class="meta">Postęp przygotowań: ${Math.round(pctFull)}%</div>
      </div>
    `;
  }

  render();
</script>
</body>
</html>
